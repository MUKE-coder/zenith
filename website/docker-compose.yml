# Zenith website — build and run the marketing site + docs.
#
#   docker compose up --build
#
# Then open http://localhost:3000. The site is self-contained: it needs no
# environment variables and no database.

services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    image: zenith/website:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
